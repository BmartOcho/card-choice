<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0b3d2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ride the Deck" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <title>Ride the Deck</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app">
      <header class="hud">
        <div class="hud-cell">
          <span class="hud-label">Round</span>
          <span class="hud-value" id="round">1<span class="hud-suffix">/13</span></span>
        </div>
        <div class="hud-cell hud-stage">
          <span class="hud-label">Stage</span>
          <span class="hud-value" id="stage-name">Red or Black</span>
        </div>
        <div class="hud-cell">
          <span class="hud-label">Left</span>
          <span class="hud-value" id="remaining">52</span>
        </div>
      </header>

      <div class="score-bar">
        <div class="score-cell">
          <span class="score-label">Score</span>
          <span class="score-value" id="score">0</span>
        </div>
        <div class="score-cell combo" id="combo-cell" hidden>
          <span class="score-label">Combo</span>
          <span class="score-value" id="combo">×1.0</span>
        </div>
        <button class="icon-btn" id="stats-btn" aria-label="Stats" title="Stats">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></svg>
        </button>
      </div>

      <section class="board">
        <div class="deck-wrap">
          <div class="deck" id="deck" aria-hidden="true">
            <div class="deck-card"></div>
            <div class="deck-card"></div>
            <div class="deck-card"></div>
            <div class="deck-card"></div>
          </div>
        </div>

        <div class="lane" id="lane" aria-live="polite"></div>

        <div class="message" id="message"></div>
      </section>

      <section class="controls" id="controls"></section>

      <div class="overlay" id="overlay" hidden>
        <div class="overlay-card" id="overlay-card">
          <h2 id="overlay-title">Ride the Deck</h2>
          <p id="overlay-body">
            Make it through all 52 cards: red/black, higher/lower, inside/outside, then guess the suit. One slip and the deck reshuffles.
          </p>
          <div class="mode-toggle" id="mode-toggle">
            <button class="mode-btn active" data-mode="daily">
              <span class="mode-name">Daily</span>
              <span class="mode-sub" id="daily-date">today</span>
            </button>
            <button class="mode-btn" data-mode="free">
              <span class="mode-name">Free Play</span>
              <span class="mode-sub">unlimited</span>
            </button>
          </div>
          <div class="overlay-actions">
            <button class="btn primary" id="overlay-btn">Deal</button>
            <button class="btn ghost" id="share-btn" hidden>Share</button>
          </div>
          <p class="overlay-foot" id="overlay-foot"></p>
        </div>
      </div>

      <div class="overlay" id="stats-overlay" hidden>
        <div class="overlay-card stats-card">
          <h2>Stats</h2>
          <div class="stats-grid" id="stats-grid"></div>
          <button class="btn ghost" id="stats-close">Close</button>
        </div>
      </div>
    </main>

    <script src="game.js"></script>
  </body>
</html>
